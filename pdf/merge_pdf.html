<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penggabung PDF Offline (JS)</title>
    <!-- <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script> -->
    <script src="pdf-lib.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
        }
        .drop-zone {
            border: 2px dashed #3498db;
            padding: 30px 20px;
            text-align: center;
            background: #f9fbfd;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .drop-zone:hover {
            background: #e1f5fe;
            border-color: #2980b9;
        }
        .file-list {
            margin: 20px 0;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 5px;
            background: #fafafa;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        .file-item:last-child { border-bottom: none; }
        .remove-btn {
            color: #e74c3c;
            cursor: pointer;
            font-weight: bold;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover { background: #27ae60; }
        .btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🔗 Penggabung PDF (JS)</h2>
    
    <div class="drop-zone" onclick="document.getElementById('pdf-input').click()">
        <p style="margin: 0; color: #7f8c8d;">Klik di sini untuk memilih file PDF</p>
        <input type="file" id="pdf-input" multiple accept="application/pdf" style="display: none;" onchange="handleFiles(event)">
    </div>

    <div class="file-list" id="file-list" style="display: none;"></div>

    <button id="merge-btn" class="btn" onclick="mergePDFs()" disabled>Gabungkan PDF</button>
</div>

<script>
    let pdfFiles = [];

    // Menangani file yang dipilih
    function handleFiles(event) {
        const files = Array.from(event.target.files);
        if (files.length === 0) return;

        pdfFiles = [...pdfFiles, ...files];
        renderFileList();
    }

    // Menampilkan daftar file di UI
    function renderFileList() {
        const listDiv = document.getElementById('file-list');
        const mergeBtn = document.getElementById('merge-btn');

        if (pdfFiles.length === 0) {
            listDiv.style.display = 'none';
            mergeBtn.disabled = true;
            return;
        }

        listDiv.style.display = 'block';
        listDiv.innerHTML = '';

        pdfFiles.forEach((file, index) => {
            const item = document.createElement('div');
            item.className = 'file-item';
            item.innerHTML = `
                <span>📄 ${index + 1}. ${file.name}</span>
                <span class="remove-btn" onclick="removeFile(${index})">✕</span>
            `;
            listDiv.appendChild(item);
        });

        // Tombol aktif jika minimal ada 2 file
        mergeBtn.disabled = pdfFiles.length < 2;
    }

    // Menghapus file dari daftar
    function removeFile(index) {
        pdfFiles.splice(index, 1);
        renderFileList();
    }

    // Proses Penggabungan PDF
    async function mergePDFs() {
        const btn = document.getElementById('merge-btn');
        btn.innerText = 'Sedang Menggabungkan...';
        btn.disabled = true;

        try {
            // Membuat dokumen PDF kosong baru
            const mergedPdf = await PDFLib.PDFDocument.create();

            for (const file of pdfFiles) {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await PDFLib.PDFDocument.load(arrayBuffer);
                
                // Ambil semua halaman dari PDF yang dimuat
                const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                
                // Masukkan halaman ke dokumen baru
                copiedPages.forEach((page) => mergedPdf.addPage(page));
            }

            // Simpan PDF baru ke dalam bentuk Bytes
            const mergedPdfBytes = await mergedPdf.save();

            // Trik download otomatis di browser
            const blob = new Blob([mergedPdfBytes], { type: 'application/pdf' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'Hasil_Gabungan.pdf';
            link.click();

            alert('Sukses! File PDF berhasil digabungkan.');
            pdfFiles = [];
            renderFileList();

        } catch (error) {
            alert('Waduh, ada error: ' + error.message);
        } finally {
            btn.innerText = 'Gabungkan PDF';
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
